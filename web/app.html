<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>哲命 — 탐구</title>
<meta name="description" content="哲命 채팅 — 사주 운세와 철학 탐구를 한 화면에서.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='14' fill='%23c2453f'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='%23e9e4d6' font-family='serif'>命</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#141824; --ink-deep:#0e111a; --paper:#e9e4d6;
    --vermilion:#c2453f; --aegean:#6b8fb3; --mist:#8b93a7; --line:#2a3145;
    --disp:"Gowun Batang",serif; --body:"Noto Sans KR",sans-serif; --mono:"IBM Plex Mono",monospace;
    --nav-h:56px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--ink);color:var(--paper);font-family:var(--body);overflow:hidden}
  a{color:inherit;text-decoration:none}

  nav{height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;
      padding:0 22px;border-bottom:1px solid var(--line);background:var(--ink)}
  .brand{font-family:var(--disp);font-size:1.15rem;letter-spacing:.35em;display:flex;align-items:center;gap:14px}
  .brand em{font-style:normal;color:var(--vermilion)}
  .back{font-size:.82rem;color:var(--mist);letter-spacing:0;font-family:var(--body)}
  .back:hover{color:var(--paper)}
  .svc-tabs{display:flex;gap:8px}
  .svc-tab{border:1px solid var(--line);border-radius:999px;padding:5px 14px;
           font-size:.8rem;color:var(--mist);white-space:nowrap;transition:color .2s,border-color .2s}
  .svc-tab:hover{color:var(--paper)}
  .svc-tab.saju:hover{border-color:var(--vermilion)}
  .svc-tab.philo:hover{border-color:var(--aegean)}
  .svc-tab.active{color:var(--paper)}
  .svc-tab.saju.active{border-color:var(--vermilion)}
  .svc-tab.philo.active{border-color:var(--aegean)}
  .right{display:flex;align-items:center;gap:12px}
  .me-btn{border:1px solid var(--vermilion);border-radius:2px;padding:5px 14px;
          font-size:.8rem;color:var(--paper);white-space:nowrap;transition:background .2s}
  .me-btn:hover{background:var(--vermilion)}
  .lang-btn{border:1px solid var(--line);border-radius:999px;background:none;cursor:pointer;
            font-family:var(--mono);font-size:.7rem;letter-spacing:.06em;padding:5px 11px;
            color:var(--mist);display:inline-flex;gap:5px;align-items:center;transition:border-color .2s}
  .lang-btn:hover{border-color:var(--mist)}
  .lang-btn .on{color:var(--paper);font-weight:500}
  @media(max-width:680px){.brand .back{display:none}}

  main{height:calc(100% - var(--nav-h));position:relative}
  iframe{width:100%;height:100%;border:0;display:block;opacity:0;transition:opacity .4s ease}
  iframe.ready{opacity:1}

  /* 로딩 — iframe 이 뜨기 전 도장이 잠깐 숨 쉰다 */
  .loading{position:absolute;inset:0;display:flex;flex-direction:column;gap:18px;
           align-items:center;justify-content:center;color:var(--mist);font-size:.85rem;
           background:var(--ink);transition:opacity .4s ease;pointer-events:none}
  .loading.done{opacity:0}
  .loading .seal{width:64px;height:64px;border:3px solid var(--vermilion);border-radius:6px;
                 color:var(--vermilion);font-family:var(--disp);font-weight:700;font-size:1.35rem;
                 display:flex;align-items:center;justify-content:center;
                 writing-mode:vertical-rl;text-orientation:upright;transform:rotate(6deg);
                 animation:breathe 1.6s ease-in-out infinite}
  @keyframes breathe{0%,100%{opacity:.5}50%{opacity:1}}
  @media(prefers-reduced-motion:reduce){.loading .seal{animation:none;opacity:.9}}
</style>
</head>
<body>

<nav>
  <span class="brand"><a href="/">哲<em>命</em></a><a class="back" href="/" data-i18n="back">← 소개로 돌아가기</a></span>
  <span class="svc-tabs" role="tablist" aria-label="서비스 전환 (새 대화로 시작)">
    <a class="svc-tab saju" id="tab-saju" href="/app?service=saju" title="사주 운세로 새 대화" data-i18n="tabSaju" data-i18n-title="tabSajuTitle">🔮 사주 운세</a>
    <a class="svc-tab philo" id="tab-philo" href="/app?service=philo" title="철학 탐구로 새 대화" data-i18n="tabPhilo" data-i18n-title="tabPhiloTitle">🧭 철학 탐구</a>
  </span>
  <span class="right">
    <button class="lang-btn" id="langBtn" type="button" aria-label="언어 전환 · Switch language">
      <span id="langKo" class="on">KO</span><span aria-hidden="true">·</span><span id="langEn">EN</span>
    </button>
    <a class="me-btn" href="/me" title="저장된 사주·철학·통합 리포트 다시 보기 (채팅과 같은 계정)" data-i18n="me" data-i18n-title="meTitle">📖 내 기록</a>
  </span>
</nav>

<main>
  <div class="loading" id="loading" aria-hidden="true">
    <div class="seal">知命</div>
    <span data-i18n="loading">두 렌즈를 닦는 중…</span>
  </div>
  <iframe id="chat" src="/chat" title="哲命 채팅 — 사주 운세 · 철학 탐구"
          allow="clipboard-write"></iframe>
</main>

<script>
  const frame = document.getElementById("chat");
  const loading = document.getElementById("loading");
  frame.addEventListener("load", () => {
    // Chainlit 앱 부트스트랩 여유를 약간 두고 전환
    setTimeout(() => { frame.classList.add("ready"); loading.classList.add("done"); }, 350);
  });

  // ── ?service=saju|philo — 랜딩에서 고른 서비스로 프로필 자동 전환 ──────────
  // Chainlit 은 URL 프로필 지정을 지원하지 않아, same-origin iframe 에서
  // 프로필 콤보박스(Radix)를 키보드 시퀀스로 조작한다. 로그인 화면이 먼저면
  // 콤보박스 등장(=로그인 완료)까지 기다린다.
  const SERVICE = new URLSearchParams(location.search).get("service");
  const TARGET = { saju: "사주", philo: "철학" }[SERVICE] || null;  // 부분일치 — "🔮 사주 · Saju"
  if (TARGET) document.getElementById("tab-" + SERVICE)?.classList.add("active");

  const sleep = (ms) => new Promise(r => setTimeout(r, ms));
  async function waitFor(fn, timeout = 90000, interval = 300) {
    const t0 = Date.now();
    for (;;) {
      let v = null;
      try { v = fn(); } catch (e) { /* iframe 문서 교체 중 */ }
      if (v) return v;
      if (Date.now() - t0 > timeout) return null;
      await sleep(interval);
    }
  }

  async function switchProfile(target) {
    const d = () => frame.contentDocument;
    const w = () => frame.contentWindow;
    const key = (el, k) => el.dispatchEvent(new (w()).KeyboardEvent("keydown", { key: k, code: k, bubbles: true }));
    const current = () => d()?.querySelector('[role="combobox"]');
    // Chainlit 이 콤보박스에 리스너를 붙이기 전의 키 입력은 무시된다 —
    // 등장 직후 잠시 기다리고, 성공 확인까지 최대 3회 재시도한다.
    const cb0 = await waitFor(current);
    if (!cb0) return;                             // 로그인 미완 등 — 조용히 포기
    await sleep(1000);
    for (let attempt = 0; attempt < 3; attempt++) {
      const cb = current();
      if (!cb) return;
      if (cb.textContent.includes(target)) break;
      cb.focus(); key(cb, "Enter");
      const opts = await waitFor(() => { const o = [...d().querySelectorAll('[role="option"]')]; return o.length ? o : null; }, 3000, 150);
      if (opts) {
        const idx = opts.findIndex(o => o.textContent.includes(target));
        if (idx < 0) { key(d().activeElement, "Escape"); return; }
        let cur = opts.findIndex(o => o.getAttribute("aria-selected") === "true" || o.dataset.state === "checked");
        if (cur < 0) cur = 0;
        const dir = idx >= cur ? "ArrowDown" : "ArrowUp";
        for (let i = 0; i < Math.abs(idx - cur); i++) { key(d().activeElement, dir); await sleep(140); }
        key(d().activeElement, "Enter");
        // 진행 중 대화가 있으면 '새 채팅' 확인 다이얼로그 — 직행 의도가 명확하므로 진행
        const confirm = await waitFor(
          () => [...d().querySelectorAll('[role="dialog"] button, [role="alertdialog"] button')]
            .find(b => ["확인", "Confirm"].includes(b.textContent.trim())), 2000, 150);
        if (confirm) confirm.click();
      }
      await sleep(900);
      if (current()?.textContent.includes(target)) break;
    }
    markActive();
  }
  function markActive() {
    document.querySelectorAll(".svc-tab").forEach(t => t.classList.remove("active"));
    if (SERVICE) document.getElementById("tab-" + SERVICE)?.classList.add("active");
  }

  // ── 언어를 채팅에 적용 — 웰컴의 '🌐 English/한국어' 액션 버튼을 대신 눌러준다.
  //    로드 시: 저장된 언어가 en 이면 자동 적용(KO 는 채팅 기본값).
  //    셸 KO·EN 토글 시: 이미 열린 채팅에도 즉시 반영(반대 언어 버튼 클릭 → 안내 재전송).
  async function clickChatLang(want, timeout) {
    const label = want === "en" ? "🌐 English" : "🌐 한국어";
    const btn = await waitFor(() => {
      const d = frame.contentDocument;
      if (!d) return null;
      return [...d.querySelectorAll("button")].find(b => b.textContent.includes(label));
    }, timeout, 400);
    if (btn) btn.click();   // 반대 언어 상태일 때만 존재 — 이미 그 언어면 조용히 무시
  }
  frame.addEventListener("load", async () => {
    if (TARGET) await switchProfile(TARGET);
    let want = null;
    try { want = localStorage.getItem("cm.lang"); } catch (e) {}
    if (want === "en") clickChatLang("en", 45000);
  }, { once: true });

  // ── KO/EN 토글 — 랜딩과 같은 localStorage("cm.lang") 공유. 셸 UI 만 즉시 전환되고,
  //    iframe 내부 채팅(Chainlit)의 언어는 채팅 쪽 작업(단계 2)에서 잇는다.
  const EN = {
    back: "← Back to intro",
    tabSaju: "🔮 Saju Fortune", tabSajuTitle: "New conversation in Saju Fortune",
    tabPhilo: "🧭 Philosophy", tabPhiloTitle: "New conversation in Philosophical Inquiry",
    me: "📖 My records", meTitle: "Revisit saved Saju, philosophy, and combined reports (same account as chat)",
    loading: "Polishing the two lenses…",
    docTitle: "哲命 — Explore",
  };
  const KO_TEXT = {}, KO_TITLE = {}, KO_DOC = document.title;
  function applyLang(lang) {
    document.documentElement.lang = lang === "en" ? "en" : "ko";
    document.querySelectorAll("[data-i18n]").forEach(el => {
      const k = el.dataset.i18n;
      if (!(k in KO_TEXT)) KO_TEXT[k] = el.textContent;
      el.textContent = lang === "en" && EN[k] ? EN[k] : KO_TEXT[k];
    });
    document.querySelectorAll("[data-i18n-title]").forEach(el => {
      const k = el.dataset.i18nTitle;
      if (!(k in KO_TITLE)) KO_TITLE[k] = el.title;
      el.title = lang === "en" && EN[k] ? EN[k] : KO_TITLE[k];
    });
    document.title = lang === "en" ? EN.docTitle : KO_DOC;
    document.getElementById("langKo").classList.toggle("on", lang !== "en");
    document.getElementById("langEn").classList.toggle("on", lang === "en");
    try { localStorage.setItem("cm.lang", lang); } catch (e) {}
    // 서버(on_chat_start)가 읽는 쿠키 — 새 채팅 세션(프로필 전환 포함)은 첫 메시지부터 이 언어
    document.cookie = "cm_lang=" + lang + "; path=/; max-age=31536000; SameSite=Lax";
  }
  const qsLang = new URLSearchParams(location.search).get("lang");
  let savedLang = null;
  try { savedLang = localStorage.getItem("cm.lang"); } catch (e) {}
  applyLang(qsLang === "en" ? "en" : qsLang === "ko" ? "ko" : (savedLang || "ko"));
  document.getElementById("langBtn").addEventListener("click", () => {
    const next = document.documentElement.lang === "en" ? "ko" : "en";
    applyLang(next);
    clickChatLang(next, 3000);  // 이미 열린 채팅에도 즉시 반영(🌐 버튼 대신 클릭)
  });
</script>
</body>
</html>
